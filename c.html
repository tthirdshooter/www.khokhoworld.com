<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaurya International - Master Certificate System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .main-container { display: grid; grid-template-columns: 400px 1fr; gap: 20px; max-width: 1500px; width: 100%; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; }
        h2 { color: #8B3A3A; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; font-size: 1.1rem; }
        .field { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 12px; color: #666; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: none; font-family: monospace; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-bulk { background: #8B3A3A; color: white; }
        .btn-single { background: #444; color: white; }
        .btn-format { background: #2c3e50; color: white; font-size: 11px; margin-top: 5px; }
        canvas { border: 1px solid #ddd; max-width: 100%; height: auto; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .status { margin-top: 10px; font-size: 13px; color: #d35400; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="panel">
        <h2>1. Serial & Counter</h2>
        <div class="field">
            <label>Fixed Serial Prefix</label>
            <input type="text" id="prefix" value="CBP/SIS/2026: " oninput="saveSettings()">
        </div>
        <div class="field">
            <label>Current Counter</label>
            <input type="number" id="counter" value="1" oninput="saveSettings()">
        </div>

        <h2>2. Names & Auto-Format</h2>
        <div class="field">
            <label>Upload Excel/CSV</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
        </div>
        <textarea id="bulkNames" placeholder="Paste names..." oninput="updatePreview()"></textarea>
        <button class="btn-format" onclick="formatAllNames()">✨ Auto-Format Names (Title Case)</button>
        
        <div class="btn-group">
            <button class="btn-bulk" onclick="processBulk()">Generate & Download All</button>
            <button class="btn-single" onclick="downloadSingle()">Download Single</button>
        </div>
        <div id="statusMsg" class="status">Ready</div>
    </div>

    <div style="text-align: center;">
        <canvas id="certCanvas" width="1414" height="1000"></canvas>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">Live Preview of First Name</p>
    </div>
</div>

<img id="template" src="https://raw.githubusercontent.com/tthirdshooter/www.khokhoworld.com/main/image/topic.jpg" style="display:none;">

<script>
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    const img = document.getElementById('template');

    window.onload = () => {
        const saved = localStorage.getItem('certSettings');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('prefix').value = data.prefix || "CBP/SIS/2026: ";
            document.getElementById('counter').value = data.counter || 1;
        }
        if (img.complete) updatePreview();
    };

    function toTitleCase(str) {
        return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    function formatAllNames() {
        const area = document.getElementById('bulkNames');
        const formatted = area.value.split('\n').map(name => toTitleCase(name.trim())).join('\n');
        area.value = formatted;
        updatePreview();
    }

    function saveSettings() {
        const settings = {
            prefix: document.getElementById('prefix').value,
            counter: document.getElementById('counter').value
        };
        localStorage.setItem('certSettings', JSON.stringify(settings));
        updatePreview();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const wb = XLSX.read(evt.target.result, {type: 'binary'});
            const names = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1}).flat().filter(n => n);
            document.getElementById('bulkNames').value = names.map(n => toTitleCase(n.toString())).join('\n');
            updatePreview();
        };
        reader.readAsBinaryString(e.target.files[0]);
    });

    function draw(name, serial) {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#1a1a1a";
        
        // Serial
        ctx.font = "bold 22px Arial";
        ctx.textAlign = "left";
        ctx.fillText(serial, 215, 70);

        // Date of Issue
        ctx.fillText("21-03-2026", 1180, 70);

        // Name
        ctx.font = "italic bold 38px 'Times New Roman', serif";
        ctx.fillText(name, 340, 442);

        // Footer Details
        ctx.font = "bold 24px Arial";
        ctx.fillText("21-03-2026", 260, 624);
        ctx.fillText("8:30 am to 2:30 pm", 495, 624);
        ctx.font = "bold 28px Arial";
        ctx.fillText("Mental Health and Wellness", 250, 700);
        ctx.font = "bold 24px Arial";
        ctx.fillText("Dr. Swati Sharma", 305, 815);
    }

    function updatePreview() {
        const names = document.getElementById('bulkNames').value.split('\n');
        const name = names[0].trim() || "Sample Name";
        const serial = document.getElementById('prefix').value + document.getElementById('counter').value.toString().padStart(3, '0');
        draw(name, serial);
    }

    function downloadSingle() {
        const names = document.getElementById('bulkNames').value.split('\n');
        const name = names[0].trim();
        if(!name) return alert("Enter a name.");
        const serial = document.getElementById('prefix').value + document.getElementById('counter').value.toString().padStart(3, '0');
        triggerDownload(name, serial);
    }

    async function processBulk() {
        const names = document.getElementById('bulkNames').value.split('\n').filter(n => n.trim() !== '');
        let count = parseInt(document.getElementById('counter').value);
        for (let name of names) {
            const serial = document.getElementById('prefix').value + count.toString().padStart(3, '0');
            draw(name.trim(), serial);
            triggerDownload(name.trim(), serial);
            await new Promise(r => setTimeout(r, 800));
            count++;
        }
        document.getElementById('counter').value = count;
        saveSettings();
    }

    function triggerDownload(name, serial) {
        const link = document.createElement('a');
        link.download = `Cert_${serial.replace(/[/:]/g, '')}_${name}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
</body>
</html>
