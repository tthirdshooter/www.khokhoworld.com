<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaurya International - Fixed Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; margin-bottom: 20px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; color: #666; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-bulk { background: #8B3A3A; color: white; }
        .btn-format { background: #2c3e50; color: white; font-size: 11px; }
        canvas { border: 1px solid #ccc; max-width: 100%; height: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #status { text-align: center; font-weight: bold; color: #d35400; margin-top: 10px; }
    </style>
</head>
<body>

<div class="controls">
    <h2 style="color:#8B3A3A; margin-top:0;">Certificate Controls</h2>
    
    <div class="field">
        <label>Serial Number (Fixed + Counter)</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="prefix" value="CBP/SIS/2026: ">
            <input type="number" id="counter" value="1" style="width:80px;">
        </div>
    </div>

    <div class="field">
        <label>Names (One per line)</label>
        <textarea id="names" placeholder="enter names here..." oninput="updatePreview()"></textarea>
        <button class="btn-format" onclick="autoFormat()">✨ Auto-Format to Title Case</button>
    </div>

    <button class="btn-bulk" onclick="startBulk()">Download All (Bulk)</button>
    <div id="status">Ready</div>
</div>

<canvas id="certCanvas" width="1414" height="1000"></canvas>

<img id="template" src="https://raw.githubusercontent.com/tthirdshooter/www.khokhoworld.com/main/image/topic.jpg" style="display:none;">

<script>
    const canvas = document.getElementById('certCanvas');
    const ctx = canvas.getContext('2d');
    const img = document.getElementById('template');

    // Solution to Overlapping: Always redraw image before text
    function draw(name, serial) {
        // 1. Clear the canvas entirely
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 2. Redraw the fresh background template
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // 3. Set text styles
        ctx.fillStyle = "#1a1a1a";
        
        // Serial No
        ctx.font = "bold 22px Arial";
        ctx.textAlign = "left";
        ctx.fillText(serial, 215, 70);

        // Name (Centered on the line)
        ctx.font = "italic bold 38px 'Times New Roman', serif";
        ctx.fillText(name, 340, 442);

        // Fixed Details
        ctx.font = "bold 24px Arial";
        ctx.fillText("21-03-2026", 1180, 70); // Top Date
        ctx.fillText("21-03-2026", 260, 624);  // Session Date
        ctx.fillText("8:30 am to 2:30 pm", 495, 624);
        ctx.font = "bold 28px Arial";
        ctx.fillText("Mental Health and Wellness", 250, 700);
        ctx.font = "bold 24px Arial";
        ctx.fillText("Dr. Swati Sharma", 305, 815);
    }

    function autoFormat() {
        const input = document.getElementById('names');
        const formatted = input.value.split('\n').map(n => 
            n.trim().toLowerCase().replace(/\b\w/g, c => c.toUpperCase())
        ).join('\n');
        input.value = formatted;
        updatePreview();
    }

    function updatePreview() {
        const nameList = document.getElementById('names').value.split('\n');
        const firstName = nameList[0].trim() || "Sample Name";
        const serial = document.getElementById('prefix').value + document.getElementById('counter').value.toString().padStart(3, '0');
        draw(firstName, serial);
    }

    async function startBulk() {
        const names = document.getElementById('names').value.split('\n').filter(n => n.trim());
        let count = parseInt(document.getElementById('counter').value);
        const prefix = document.getElementById('prefix').value;

        for (let name of names) {
            const serial = prefix + count.toString().padStart(3, '0');
            document.getElementById('status').innerText = `Generating: ${serial}`;
            
            draw(name.trim(), serial);
            
            // Trigger download
            const link = document.createElement('a');
            link.download = `Cert_${count}_${name.trim()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            
            await new Promise(r => setTimeout(r, 1000)); // Delay to prevent browser lag
            count++;
        }
        document.getElementById('counter').value = count;
        document.getElementById('status').innerText = "Finished!";
    }

    img.onload = updatePreview;
</script>
</body>
</html>
