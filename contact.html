<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firestore Contact Form</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f4f7f6; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #333; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #4CAF50; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Send a Message</h2>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" rows="4" placeholder="How can we help?" required></textarea>
        <button type="submit" id="submitBtn">Submit to Firestore</button>
    </form>
    <p id="status"></p>
</div>

<script type="module">
    // Import Firestore functions
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // Your Firebase Config (Copy from Firebase Console)
    const firebaseConfig = {
        apiKey: "AIzaSyBVFZ6EnTiIrDYzAVseMKpD3o7lQgZ1D3E",
  authDomain: "login-abad1.firebaseapp.com",
  projectId: "login-abad1",
  storageBucket: "login-abad1.firebasestorage.app",
  messagingSenderId: "5117210651",
  appId: "1:5117210651:web:f76527eb00d42ba2bac8be",
  measurementId: "G-JN5BLFMTK1"
    };

    // Initialize Firebase and Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Form logic
    const contactForm = document.getElementById('contactForm');
    
    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('status');
        const btn = document.getElementById('submitBtn');

        // Disable button while sending
        btn.disabled = true;
        status.innerText = "Sending...";

        try {
            // Add a new document to the "messages" collection
            await addDoc(collection(db, "messages"), {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                createdAt: serverTimestamp() // Firestore server-side time
            });

            status.style.color = "green";
            status.innerText = "Message saved in Firestore! ✅";
            contactForm.reset();
        } catch (error) {
            console.error("Error adding document: ", error);
            status.style.color = "red";
            status.innerText = "Failed to send message. ❌";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
